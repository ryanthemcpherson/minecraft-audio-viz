name: Release Minecraft Mod

on:
  push:
    tags: ['mod-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build Fabric Mod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        working-directory: minecraft_mod
        run: ./gradlew build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-mod
          path: minecraft_mod/build/libs/audioviz-mod-*.jar

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=mod-v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "VERSION=${TAG#mod-v}" >> $GITHUB_OUTPUT
            echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Download mod artifact
        uses: actions/download-artifact@v8
        with:
          name: minecraft-mod
          path: mod/

      - name: Generate checksums
        run: |
          cd mod
          sha256sum *.jar > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: MCAV Fabric Mod ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          body: |
            ## MCAV Fabric Mod ${{ steps.version.outputs.VERSION }}

            Minecraft 1.21.11 | Fabric Loader | Java 21

            ### Requirements
            - [Fabric Loader](https://fabricmc.net/use/installer/) 0.16+
            - [Fabric API](https://modrinth.com/mod/fabric-api)
            - [Polymer](https://modrinth.com/mod/polymer) (bundled)
            - Java 21

            ### Optional
            - [Simple Voice Chat](https://modrinth.com/mod/simple-voice-chat) for DJ audio relay

            ### Installation
            Drop the `.jar` into your server's `mods/` folder.
          files: |
            mod/*.jar
            mod/SHA256SUMS.txt
