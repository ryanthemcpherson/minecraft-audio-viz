name: Release Minecraft Plugin

on:
  push:
    tags: ['plugin-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build Paper Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: minecraft_plugin
        run: ./mvnw package -q

      - name: Run tests
        working-directory: minecraft_plugin
        run: ./mvnw test -q

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: minecraft-plugin
          path: minecraft_plugin/target/audioviz-plugin-*.jar
          # Exclude the original (unshaded) JAR
          exclude: minecraft_plugin/target/original-*.jar

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=plugin-v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "VERSION=${TAG#plugin-v}" >> $GITHUB_OUTPUT
            echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Download plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: minecraft-plugin
          path: plugin/

      - name: Remove original (unshaded) JAR
        run: rm -f plugin/original-*.jar

      - name: Generate checksums
        run: |
          cd plugin
          sha256sum *.jar > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: MCAV Paper Plugin ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          body: |
            ## MCAV Paper Plugin ${{ steps.version.outputs.VERSION }}

            Minecraft 1.21.11 | Paper/Spigot | Java 21

            ### Requirements
            - [Paper](https://papermc.io/downloads/paper) 1.21.11+ (or Spigot/Purpur)
            - Java 21

            ### Optional
            - [Simple Voice Chat](https://modrinth.com/mod/simple-voice-chat) for DJ audio relay

            ### Installation
            Drop the `.jar` into your server's `plugins/` folder.
          files: |
            plugin/*.jar
            plugin/SHA256SUMS.txt
