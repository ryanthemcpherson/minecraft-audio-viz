name: Release DJ Client

on:
  push:
    tags: ['dj-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            artifact_name: dj-client-linux-x64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_name: dj-client-windows-x64
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            artifact_name: dj-client-macos-x64
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            artifact_name: dj-client-macos-arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Import Windows code signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_BASE64 != ''
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $securePass = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePass
          $cert = Get-PfxCertificate -FilePath $certPath
          echo "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Remove-Item $certPath

      - name: Import macOS code signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm "$CERTIFICATE_PATH"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dj_client/src-tauri

      - name: Install frontend dependencies
        working-directory: dj_client
        run: npm ci

      - name: Build frontend
        working-directory: dj_client
        run: npm run build

      - name: Disable updater artifacts when signing key is missing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            node -e "const fs=require('fs'); const path='dj_client/src-tauri/tauri.conf.json'; const conf=JSON.parse(fs.readFileSync(path,'utf8')); if (conf.bundle && conf.bundle.createUpdaterArtifacts) { conf.bundle.createUpdaterArtifacts=false; fs.writeFileSync(path, JSON.stringify(conf, null, 2)+'\n'); console.log('Disabled bundle.createUpdaterArtifacts for unsigned build'); }"
          fi

      - name: Configure Windows code signing command
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_THUMBPRINT != ''
        shell: bash
        run: |
          echo "TAURI_WINDOWS_SIGN_COMMAND=signtool sign /sha1 $WINDOWS_CERTIFICATE_THUMBPRINT /fd sha256 /td sha256 /tr http://time.certum.pl \"%1\"" >> $GITHUB_ENV

      - name: Build Tauri app (signed)
        if: runner.os != 'macOS' || env.APPLE_CERTIFICATE_BASE64 != ''
        working-directory: dj_client
        run: npm run tauri build -- --target ${{ matrix.rust_target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Tauri app (unsigned macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 == ''
        working-directory: dj_client
        run: npm run tauri build -- --target ${{ matrix.rust_target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}

      - name: Collect Linux bundles
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p release-artifacts
          cp dj_client/src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage release-artifacts/ || true
          cp dj_client/src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb release-artifacts/ || true

      - name: Collect Windows bundles
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts
          Copy-Item "dj_client/src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi" release-artifacts/ -ErrorAction SilentlyContinue
          Copy-Item "dj_client/src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe" release-artifacts/ -ErrorAction SilentlyContinue

      - name: Collect macOS bundles
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p release-artifacts
          cp dj_client/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg release-artifacts/ || true

      - name: Collect updater artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          find dj_client/src-tauri/target/${{ matrix.rust_target }}/release/bundle -name "*.sig" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          find dj_client/src-tauri/target/${{ matrix.rust_target }}/release/bundle -name "*.tar.gz" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          find dj_client/src-tauri/target/${{ matrix.rust_target }}/release/bundle -name "*.zip" -exec cp {} release-artifacts/ \; 2>/dev/null || true

      - name: Rename macOS updater artifacts to include arch
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd release-artifacts
          if [ "${{ matrix.rust_target }}" = "aarch64-apple-darwin" ]; then
            ARCH="aarch64"
          else
            ARCH="x64"
          fi
          for f in *.app.tar.gz.sig; do
            [ -f "$f" ] || continue
            mv "$f" "${f/.app./.app_${ARCH}.}"
          done
          for f in *.app.tar.gz; do
            [ -f "$f" ] || continue
            mv "$f" "${f/.app./.app_${ARCH}.}"
          done

      - name: Cleanup macOS keychain
        if: runner.os == 'macOS' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release-artifacts/
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=dj-v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "VERSION=${TAG#dj-v}" >> $GITHUB_OUTPUT
            echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate updater latest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ steps.version.outputs.TAG }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Find signature files
          WIN_SIG=$(cat artifacts/dj-client-windows-x64/*.nsis.zip.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat artifacts/dj-client-linux-x64/*.AppImage.tar.gz.sig 2>/dev/null || echo "")
          MAC_X64_SIG=$(cat artifacts/dj-client-macos-x64/*.app_x64.tar.gz.sig 2>/dev/null || echo "")
          MAC_ARM_SIG=$(cat artifacts/dj-client-macos-arm64/*.app_aarch64.tar.gz.sig 2>/dev/null || echo "")

          # Find artifact filenames
          WIN_ZIP=$(ls artifacts/dj-client-windows-x64/*.nsis.zip 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          LINUX_TGZ=$(ls artifacts/dj-client-linux-x64/*.AppImage.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          MAC_X64_TGZ=$(ls artifacts/dj-client-macos-x64/*.app_x64.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          MAC_ARM_TGZ=$(ls artifacts/dj-client-macos-arm64/*.app_aarch64.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          # Build platforms JSON
          PLATFORMS="{}"
          if [ -n "$WIN_SIG" ] && [ -n "$WIN_ZIP" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE}/${WIN_ZIP}" --arg sig "$WIN_SIG" '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi
          if [ -n "$LINUX_SIG" ] && [ -n "$LINUX_TGZ" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE}/${LINUX_TGZ}" --arg sig "$LINUX_SIG" '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
          fi
          if [ -n "$MAC_X64_SIG" ] && [ -n "$MAC_X64_TGZ" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE}/${MAC_X64_TGZ}" --arg sig "$MAC_X64_SIG" '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
          fi
          if [ -n "$MAC_ARM_SIG" ] && [ -n "$MAC_ARM_TGZ" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE}/${MAC_ARM_TGZ}" --arg sig "$MAC_ARM_SIG" '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          jq -n --arg version "$VERSION" --arg date "$DATE" --arg notes "MCAV DJ Client ${VERSION}" --argjson platforms "$PLATFORMS" \
            '{version: $version, pub_date: $date, notes: $notes, platforms: $platforms}' > latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: List all artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: MCAV DJ Client ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          body: |
            ## MCAV DJ Client ${{ steps.version.outputs.VERSION }}

            ### Downloads
            | Platform | Download |
            |----------|----------|
            | Windows | `.exe` (NSIS installer) or `.msi` |
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Linux | `.AppImage` or `.deb` |
          files: |
            artifacts/dj-client-windows-x64/*
            artifacts/dj-client-linux-x64/*
            artifacts/dj-client-macos-x64/*
            artifacts/dj-client-macos-arm64/*
            latest.json
