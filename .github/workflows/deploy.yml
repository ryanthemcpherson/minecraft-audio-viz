name: Deploy to Dev Server

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests before deploy'
        required: false
        default: 'false'
        type: boolean

# Only one deploy at a time
concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  DEPLOY_PATH: /home/ryan/minecraft-audio-viz
  MODS_DIR: /home/ryan/minecraft-server/mods
  JAVA_VERSION: '21'

jobs:
  # ---------------------------------------------------------------------------
  # Build the Fabric mod JAR (on GitHub-hosted runner for caching)
  # ---------------------------------------------------------------------------
  build-mod:
    name: Build Mod JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        working-directory: minecraft_mod
        run: ./gradlew build

      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: audioviz-mod
          path: minecraft_mod/build/libs/audioviz-mod-*.jar

  # ---------------------------------------------------------------------------
  # Run Python tests (unless skipped) — on GitHub-hosted runner
  # ---------------------------------------------------------------------------
  test-python:
    name: Python Tests
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: coordinator
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run coordinator tests
        working-directory: coordinator
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Deploy on the dev server itself (self-hosted runner)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Dev Server
    needs: [build-mod, test-python]
    if: always() && needs.build-mod.result == 'success' && (needs.test-python.result == 'success' || needs.test-python.result == 'skipped')
    runs-on: [self-hosted, dev-server]
    environment: dev-server
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Download mod JAR
        uses: actions/download-artifact@v4
        with:
          name: audioviz-mod
          path: ./mod-jar/

      # --- Sync code to deploy path ---
      - name: Sync repository to deploy path
        run: |
          echo "=== Syncing code to ${{ env.DEPLOY_PATH }} ==="
          mkdir -p "${{ env.DEPLOY_PATH }}"

          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'build' \
            --exclude '.gradle' \
            --exclude 'dist' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude '.venv' \
            --exclude 'dj_client/src-tauri/target' \
            --exclude 'minecraft_mod/build' \
            "$GITHUB_WORKSPACE/" "${{ env.DEPLOY_PATH }}/"

      # --- Keep git state in sync (rsync excludes .git, so HEAD drifts) ---
      - name: Sync git HEAD to deployed commit
        run: |
          cd "${{ env.DEPLOY_PATH }}"
          git fetch origin main --quiet
          git reset --hard origin/main --quiet
          echo "Git HEAD now at: $(git log --oneline -1)"

      # --- Copy mod JAR ---
      - name: Copy mod JAR to mods directory
        run: |
          echo "=== Copying mod JAR ==="
          mkdir -p "${{ env.MODS_DIR }}"
          rm -f "${{ env.MODS_DIR }}"/audioviz-mod-*.jar
          cp -v ./mod-jar/audioviz-mod-*.jar "${{ env.MODS_DIR }}/"

      # --- Install Python dependencies ---
      - name: Install Python dependencies
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "=== Installing/updating Python dependencies ==="
          python3 -m venv .venv || true
          source .venv/bin/activate
          pip install -e "vj_server/[full]" -e "coordinator/[dev]" --quiet 2>&1 | tail -5

      # --- Run tests on server ---
      - name: Run tests on server
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "=== Running coordinator tests on server ==="
          source .venv/bin/activate
          cd coordinator && pytest tests/ -v --tb=short

      # --- Restart VJ server (picks up new code) ---
      - name: Restart VJ server
        run: |
          echo "=== Restarting VJ server ==="
          sudo systemctl restart audioviz-vj.service
          sleep 3
          if systemctl is-active --quiet audioviz-vj.service; then
            echo "SUCCESS: audioviz-vj.service is running"
          else
            echo "WARNING: audioviz-vj.service failed to start"
            sudo journalctl -u audioviz-vj.service --no-pager -n 20
          fi

      # --- Restart Minecraft server ---
      - name: Restart Minecraft server
        run: |
          echo "=== Stopping Minecraft server ==="
          sudo systemctl stop minecraft.service || true

          # Kill any rogue java processes holding the world lock
          LOCK_FILE="/home/ryan/minecraft-server/world/session.lock"
          if LOCK_PID=$(sudo fuser "$LOCK_FILE" 2>/dev/null); then
            echo "WARNING: session.lock held by PID $LOCK_PID — killing stale process"
            sudo kill "$LOCK_PID" 2>/dev/null || true
            sleep 3
            sudo kill -9 "$LOCK_PID" 2>/dev/null || true
            sleep 2
          fi

          # Wait for the lock file to be released
          for i in $(seq 1 10); do
            if ! sudo fuser "$LOCK_FILE" >/dev/null 2>&1; then
              echo "Lock file is free"
              break
            fi
            echo "Waiting for lock to release (attempt $i/10)..."
            sleep 2
          done

          echo "=== Starting Minecraft server ==="
          sudo systemctl start minecraft.service

          echo "=== Waiting for Minecraft to start ==="
          sleep 15

          echo "=== Health check ==="
          if systemctl is-active --quiet minecraft.service; then
            echo "SUCCESS: minecraft.service is running"
          else
            echo "ERROR: minecraft.service failed to start"
            sudo journalctl -u minecraft.service --no-pager -n 30
            exit 1
          fi

      # --- Verify mod loaded ---
      - name: Verify AudioViz mod loaded
        run: |
          echo "=== Checking Minecraft server logs for AudioViz ==="
          # Give the server a moment to finish loading mods
          sleep 5
          if sudo journalctl -u minecraft.service --no-pager -n 100 | grep -qi "AudioViz"; then
            echo "SUCCESS: AudioViz mod appears in server logs"
          else
            echo "WARNING: AudioViz not found in recent logs (may still be loading)"
          fi

      # --- Summary ---
      - name: Deploy summary
        if: always()
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** $(hostname) (self-hosted)" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Path:** ${{ env.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
