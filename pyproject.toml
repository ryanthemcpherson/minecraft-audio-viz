# Root pyproject.toml - workspace configuration and shared tool settings
# Package configs are in vj_server/pyproject.toml and coordinator/pyproject.toml

[tool.uv.workspace]
members = ["vj_server"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.bandit]
exclude_dirs = ["archive", "vj_server/tests"]
confidence = ["MEDIUM", "HIGH"]
skips = ["B101", "B104", "B110", "B311", "B605", "B607"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["vj_server/tests"]
